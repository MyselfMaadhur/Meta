<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Maadhur</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  :root {
    --deep-void: #0A0B0E;
    --surface: #131316;
    --border: #1A1A1E;
    --text: #F0F0F5;
    --muted: #8A8B96;
    --pink: #FF4D8B;
    --blue: #00D4FF;
    --violet: #8B5CF6;
    --green: #22C55E;
    --orange: #F59E0B;
    --red: #EF4444;
    --cyan: #06B6D4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--deep-void);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    max-width: 430px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
    animation: float 15s ease-in-out infinite;
  }
  .bg-orb-1 { width: 300px; height: 300px; background: var(--pink); top: -5%; left: -10%; }
  .bg-orb-2 { width: 250px; height: 250px; background: var(--blue); top: 30%; right: -15%; animation-delay: -5s; animation-duration: 18s; }
  .bg-orb-3 { width: 200px; height: 200px; background: var(--violet); bottom: 5%; left: 10%; animation-delay: -10s; animation-duration: 16s; }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, -20px) scale(1.08); }
    66% { transform: translate(-15px, 15px) scale(0.95); }
  }

  .header {
    padding: 16px 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }
  .brand {
    font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, var(--text) 60%, var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-tag {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    font-weight: 600;
  }

  .hero {
    padding: 8px 20px 16px;
    text-align: center;
    z-index: 10;
  }
  .hero-title {
    font-weight: 900;
    font-size: clamp(28px, 7vw, 42px);
    line-height: 1.1;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--text) 50%, var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero-desc {
    color: var(--muted); font-size: 13px;
    line-height: 1.5; max-width: 320px;
    margin: 0 auto 16px;
  }

  .subjects-section {
    flex: 1;
    padding: 0 16px 20px;
    overflow-y: auto;
    z-index: 10;
    scrollbar-width: none;
  }
  .subjects-section::-webkit-scrollbar { display: none; }

  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
    padding-left: 4px;
  }

  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .subject-card {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 12px; border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .subject-card:active { transform: scale(0.97); }
  .subject-card:hover {
    border-color: var(--glow);
    box-shadow: 0 4px 20px var(--glow-shadow);
  }
  .subject-circle {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .subject-circle svg { width: 20px; height: 20px; color: white; }
  .subject-info h3 {
    font-weight: 700; font-size: 13px;
    color: var(--text); margin-bottom: 2px;
  }
  .subject-info p {
    font-size: 10px; color: var(--muted);
    line-height: 1.3;
  }

  .detail-page {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--deep-void);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-page.active { display: flex; }

  .detail-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,11,14,0.8);
    backdrop-filter: blur(12px);
    z-index: 10;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text);
    transition: all 0.2s ease;
  }
  .back-btn:active { transform: scale(0.95); }
  .detail-title {
    font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, var(--text) 60%, var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .detail-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    scrollbar-width: none;
  }
  .detail-content::-webkit-scrollbar { display: none; }

  .detail-section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
    padding-left: 4px;
  }

  .subtopic-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .subtopic-card {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 14px; border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .subtopic-card:active { transform: scale(0.98); }
  .subtopic-card:hover {
    border-color: var(--glow);
    box-shadow: 0 4px 20px var(--glow-shadow);
  }
  .subtopic-circle {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .subtopic-circle svg { width: 22px; height: 22px; color: white; }
  .subtopic-info h4 {
    font-weight: 700; font-size: 14px;
    color: var(--text); margin-bottom: 3px;
  }
  .subtopic-info p {
    font-size: 11px; color: var(--muted);
    line-height: 1.4;
  }
  .subtopic-arrow {
    margin-left: auto;
    color: var(--muted);
    opacity: 0.5;
  }

  .video-page {
    position: fixed;
    inset: 0;
    z-index: 300;
    background: var(--deep-void);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  .video-page.active { display: flex; }

  .video-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,11,14,0.8);
    backdrop-filter: blur(12px);
    z-index: 10;
  }

  .video-content {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    scrollbar-width: none;
  }
  .video-content::-webkit-scrollbar { display: none; }

  .video-section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 14px;
  }

  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
    transition: all 0.3s ease;
  }
  .video-card:hover {
    border-color: rgba(139,92,246,0.3);
    box-shadow: 0 4px 24px rgba(139,92,246,0.1);
  }

  .video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
  }
  .video-wrapper iframe {
    width: 100%;
    height: 100%;
    display: block;
    border: none;
    outline: none;
  }

  .video-info {
    padding: 14px 16px;
  }
  .video-info h4 {
    font-weight: 700; font-size: 14px;
    color: var(--text); margin-bottom: 4px;
  }
  .video-info p {
    font-size: 12px; color: var(--muted);
    line-height: 1.5;
  }
  .video-meta {
    display: flex; align-items: center; gap: 12px;
    margin-top: 10px;
  }
  .video-tag {
    font-size: 10px; font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(139,92,246,0.1);
    color: var(--violet);
    border: 1px solid rgba(139,92,246,0.2);
  }
  .video-duration {
    font-size: 11px; color: var(--muted);
    font-weight: 500;
  }

  .bottom-nav {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 10px 0 24px;
    background: rgba(10,11,14,0.85);
    backdrop-filter: blur(20px);
    border-top: 1px solid rgba(255,255,255,0.05);
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    color: var(--muted); text-decoration: none;
    font-size: 10px; font-weight: 500;
    transition: color 0.3s ease;
    padding: 4px 12px;
  }
  .nav-item.active, .nav-item:hover { color: var(--pink); }
  .nav-item svg { width: 22px; height: 22px; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .anim-in { animation: slideUp 0.5s ease-out both; }
  .delay-1 { animation-delay: 0.1s; }
  .delay-2 { animation-delay: 0.2s; }
  .delay-3 { animation-delay: 0.3s; }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .slide-in { animation: slideInRight 0.35s ease-out both; }
</style>

// Track checked facts per chapter
let historyProgress = {};

try {
  const saved = localStorage.getItem('historyProgress');
  if (saved) historyProgress = JSON.parse(saved);
} catch(e) {}

function saveHistoryProgress() {
  try { localStorage.setItem('historyProgress', JSON.stringify(historyProgress)); } catch(e) {}
}

function openHistoryDetail() {
  document.getElementById('historyDetail').classList.add('active');
  renderHistoryChapters();
}

function renderHistoryChapters() {
  const grid = document.getElementById('historyChapterGrid');
  grid.innerHTML = '';

  medievalHistoryChapters.forEach((ch, i) => {
    const checked = historyProgress[ch.name] || [];
    const total = ch.facts.length;
    const done = checked.length;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'subtopic-card slide-in';
    card.style.setProperty('--glow', ch.glow);
    card.style.setProperty('--glow-shadow', ch.glowShadow);
    card.style.animationDelay = `${i * 0.08}s`;
    card.innerHTML = `
      <div class="subtopic-circle" style="background:${ch.gradient};">${ch.icon}</div>
      <div class="subtopic-info">
        <h4>${ch.name}</h4>
        <p>${ch.desc}</p>
        <div class="chapter-progress">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <span class="progress-text">${done}/${total}</span>
        </div>
      </div>
      <div class="subtopic-arrow">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    `;
    card.addEventListener('click', () => openHistoryNotes(i));
    grid.appendChild(card);
  });
}

function openHistoryNotes(chapterIndex) {
  const ch = medievalHistoryChapters[chapterIndex];
  document.getElementById('historyNotesTitle').textContent = ch.name;
  const content = document.getElementById('historyNotesContent');
  content.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'chapter-intro slide-in';
  intro.innerHTML = `
    <h3>${ch.name}</h3>
    <p>${ch.desc}</p>
  `;
  content.appendChild(intro);

  const summary = document.createElement('div');
  summary.className = 'summary-box slide-in';
  summary.style.animationDelay = '0.1s';
  summary.innerHTML = `
    <h4>Quick Summary</h4>
    <ul>${ch.summary.map(s => `<li>${s}</li>`).join('')}</ul>
  `;
  content.appendChild(summary);

  const label = document.createElement('div');
  label.className = 'video-section-label';
  label.textContent = 'Key Facts & Points';
  content.appendChild(label);

  const checked = historyProgress[ch.name] || [];
  ch.facts.forEach((fact, i) => {
    const isChecked = checked.includes(i);
    const card = document.createElement('div');
    card.className = `fact-card slide-in ${isChecked ? 'completed' : ''}`;
    card.style.animationDelay = `${0.15 + i * 0.05}s`;
    card.innerHTML = `
      <div class="fact-row">
        <span class="fact-number">${i + 1}</span>
        <span class="fact-text">${fact}</span>
        <button class="check-btn ${isChecked ? 'checked' : ''}" onclick="toggleFact('${ch.name}', ${i}, this)" title="Mark as learned">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        </button>
      </div>
    `;
    content.appendChild(card);
  });

  document.getElementById('historyNotesPage').classList.add('active');
}

function toggleFact(chapterName, factIndex, btn) {
  if (!historyProgress[chapterName]) historyProgress[chapterName] = [];
  const idx = historyProgress[chapterName].indexOf(factIndex);

  if (idx > -1) {
    historyProgress[chapterName].splice(idx, 1);
    btn.classList.remove('checked');
    btn.closest('.fact-card').classList.remove('completed');
  } else {
    historyProgress[chapterName].push(factIndex);
    btn.classList.add('checked');
    btn.closest('.fact-card').classList.add('completed');
  }

  saveHistoryProgress();
}

function goBackHistory() {
  document.getElementById('historyDetail').classList.remove('active');
}

function goBackFromNotes() {
  document.getElementById('historyNotesPage').classList.remove('active');
  renderHistoryChapters();
}

// Render subjects
const grid = document.getElementById('subjectsGrid');
subjects.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'subject-card';
  card.style.setProperty('--glow', s.glow);
  card.style.setProperty('--glow-shadow', s.glowShadow);
  card.style.animation = `slideUp 0.4s ease-out ${0.3 + i * 0.04}s both`;
  card.innerHTML = `
    <div class="subject-circle" style="background:${s.gradient};">${s.icon}</div>
    <div class="subject-info">
      <h3>${s.name}</h3>
      <p>${s.desc}</p>
    </div>
  `;
  if (s.name === 'Polity') {
    card.addEventListener('click', openPolityDetail);
  } else if (s.name === 'History') {
    card.addEventListener('click', openHistoryDetail);
  }
  grid.appendChild(card);
});

// Render Polity subtopics
const subtopicGrid = document.getElementById('subtopicGrid');
politySubtopics.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'subtopic-card slide-in';
  card.style.setProperty('--glow', s.glow);
  card.style.setProperty('--glow-shadow', s.glowShadow);
  card.style.animationDelay = `${i * 0.08}s`;
  card.innerHTML = `
    <div class="subtopic-circle" style="background:${s.gradient};">${s.icon}</div>
    <div class="subtopic-info">
      <h4>${s.name}</h4>
      <p>${s.desc}</p>
    </div>
    <div class="subtopic-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  `;
  if (s.hasVideos) {
    card.addEventListener('click', openConstitutionVideos);
  }
  subtopicGrid.appendChild(card);
});

// Render Constitution videos with YouTube embed
const videoContent = document.getElementById('videoContent');

function renderVideos() {
  const oldList = document.getElementById('videoList');
  if (oldList) oldList.remove();

  const videoContainer = document.createElement('div');
  videoContainer.id = 'videoList';
  videoContent.appendChild(videoContainer);

  // Classes Section Label
  const classesLabel = document.createElement('div');
  classesLabel.className = 'video-section-label';
  classesLabel.textContent = 'Classes';
  classesLabel.style.marginTop = '20px';
  videoContainer.appendChild(classesLabel);

  constitutionClasses.forEach((v, i) => {
    const card = document.createElement('div');
    card.className = 'video-card slide-in';
    card.style.animationDelay = `${i * 0.1}s`;

    const embedUrl = `https://www.youtube.com/embed/${v.youtubeId}?rel=0&modestbranding=1`;

    card.innerHTML = `
      <div class="video-wrapper">
        <iframe
          src="${embedUrl}"
          title="${v.title}"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
          loading="lazy"
        ></iframe>
      </div>
      <div class="video-info">
        <h4>${v.title}</h4>
        <p>${v.desc}</p>
        <div class="video-meta">
          <span class="video-tag">${v.tag}</span>
          <span class="video-duration">${v.duration}</span>
        </div>
      </div>
    `;
    videoContainer.appendChild(card);
  });
}

function openPolityDetail() {
  document.getElementById('polityDetail').classList.add('active');
}

function openConstitutionVideos() {
  document.getElementById('constitutionVideos').classList.add('active');
  renderVideos();
}

function goBack() {
  document.querySelectorAll('iframe').forEach(f => {
    const src = f.src;
    f.src = '';
    f.src = src;
  });
  document.getElementById('polityDetail').classList.remove('active');
}

function goBackFromVideos() {
  document.querySelectorAll('iframe').forEach(f => {
    const src = f.src;
    f.src = '';
    f.src = src;
  });
  document.getElementById('constitutionVideos').classList.remove('active');
}

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', function(e) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
