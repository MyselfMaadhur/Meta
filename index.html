<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>StudyTube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        /* ===== ANDROID-STYLE HEADER ===== */
        .header {
            background: #1e293b;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
            min-height: 56px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .header h1 {
            font-size: 1.15rem;
            color: #38bdf8;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .header h1::before { content: "📚"; font-size: 1.3rem; }

        .view-toggle {
            display: flex;
            background: #0f172a;
            border-radius: 20px;
            padding: 3px;
            border: 1px solid #334155;
            flex-shrink: 0;
        }

        .view-toggle button {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 18px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .view-toggle button.active {
            background: #38bdf8;
            color: #0f172a;
        }

        .btn {
            padding: 8px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn:active { transform: scale(0.96); }

        .btn-primary {
            background: #38bdf8;
            color: #0f172a;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-secondary {
            background: #475569;
            color: white;
        }

        .btn-ghost {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
        }

        .btn-warning {
            background: #f59e0b;
            color: #0f172a;
        }

        /* ===== CIRCLES DASHBOARD ===== */
        .circles-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 40px 16px;
            min-height: calc(100vh - 56px);
        }

        .subject-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #1e293b;
            border: 2.5px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        .subject-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(56, 189, 248, 0.12), transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .subject-circle:hover::before, .subject-circle:active::before { opacity: 1; }

        .subject-circle:active {
            border-color: #38bdf8;
            transform: scale(0.95);
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
        }

        .subject-circle .circle-icon {
            font-size: 2.2rem;
            margin-bottom: 3px;
            z-index: 1;
        }

        .subject-circle .circle-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: #f1f5f9;
            text-align: center;
            padding: 0 8px;
            z-index: 1;
            line-height: 1.2;
        }

        .subject-circle .circle-progress {
            position: absolute;
            bottom: 8px;
            font-size: 0.6rem;
            color: #22c55e;
            font-weight: 600;
            z-index: 1;
            background: rgba(15, 23, 42, 0.85);
            padding: 1px 6px;
            border-radius: 8px;
        }

        .subject-circle .circle-ring {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #22c55e;
            opacity: 0;
            transition: opacity 0.3s;
            animation: spin 3s linear infinite;
        }

        .subject-circle:active .circle-ring { opacity: 0.5; }

        @keyframes spin { to { transform: rotate(360deg); } }

        .subject-circle.dragging {
            opacity: 0.5;
            transform: scale(0.92);
            border-color: #38bdf8;
            border-style: dashed;
        }

        .subject-circle.drag-over {
            border-color: #22c55e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
            transform: scale(1.1);
        }

        .subject-circle .drag-handle {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: #334155;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #94a3b8;
            cursor: grab;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .subject-circle:hover .drag-handle { opacity: 1; }

        .add-circle {
            border: 2.5px dashed #475569;
            background: transparent;
        }

        .add-circle:active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
        }

        .add-circle .circle-icon {
            font-size: 2rem;
            color: #64748b;
        }

        .add-circle .circle-name {
            color: #64748b;
            font-weight: 600;
        }

        /* ===== SUBJECT DETAIL VIEW ===== */
        .subject-detail { display: none; }
        .subject-detail.active { display: block; animation: slideIn 0.25s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ===== ANDROID-STYLE APP BAR ===== */
        .app-bar {
            background: #1e293b;
            padding: 10px 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 56px;
            z-index: 99;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: #334155;
            color: #e2e8f0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .back-btn:active {
            background: #475569;
            transform: scale(0.92);
        }

        .back-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .app-bar-title {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 0;
        }

        .app-bar-title .icon {
            font-size: 1.6rem;
            flex-shrink: 0;
        }

        .app-bar-title h2 {
            font-size: 1.1rem;
            color: #f1f5f9;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .app-bar-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .app-bar-progress-bar {
            width: 80px;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }

        .app-bar-progress-fill {
            height: 100%;
            background: #22c55e;
            border-radius: 3px;
            transition: width 0.4s;
        }

        .app-bar-progress-text {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 600;
        }

        .app-bar-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ===== IN-APP VIDEO PLAYER ===== */
        .video-player-section {
            background: #000;
            position: relative;
            width: 100%;
        }

        .video-player-container {
            position: relative;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            background: #000;
        }

        .video-player-container iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
        }

        .player-controls-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #1e293b;
            border-top: 1px solid #334155;
            gap: 10px;
        }

        .player-controls-bar h3 {
            font-size: 0.85rem;
            color: #e2e8f0;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-btns {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .player-btns .btn {
            padding: 6px 12px;
            font-size: 0.78rem;
        }

        /* ===== VIDEO GRID ===== */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
            max-width: 100%;
            margin: 0 auto;
        }

        @media (min-width: 640px) {
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
                padding: 20px;
            }
        }

        .video-card {
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
            transition: all 0.2s;
            position: relative;
            cursor: pointer;
        }

        .video-card:active {
            border-color: #475569;
            transform: scale(0.98);
        }

        .video-card.active-playing {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.25);
        }

        .video-card.completed { border-color: #22c55e; }

        .video-card.completed .video-thumbnail::after {
            content: "✓";
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            background: #22c55e;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
            z-index: 2;
            box-shadow: 0 2px 6px rgba(34, 197, 94, 0.4);
        }

        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .video-card:active .play-overlay { opacity: 1; }

        .play-icon {
            width: 40px;
            height: 40px;
            background: rgba(239, 68, 68, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .video-info { padding: 10px 12px; }

        .video-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 6px;
            line-height: 1.3;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .video-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-status {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 7px;
            border-radius: 5px;
        }

        .video-status.completed {
            background: rgba(34, 197, 94, 0.12);
            color: #22c55e;
        }

        .video-status.pending {
            background: rgba(100, 116, 139, 0.12);
            color: #64748b;
        }

        .video-actions { display: flex; gap: 3px; }

        .icon-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: none;
            background: #334155;
            color: #94a3b8;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            font-size: 0.7rem;
        }

        .icon-btn:active {
            background: #475569;
            color: #e2e8f0;
            transform: scale(0.9);
        }

        .icon-btn.delete:active {
            background: #ef4444;
            color: white;
        }

        .add-video-card {
            border: 2px dashed #334155;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-video-card:active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.03);
            transform: scale(0.98);
        }

        .add-video-card .plus {
            font-size: 2rem;
            color: #475569;
            margin-bottom: 4px;
        }

        .add-video-card span {
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1e293b;
            border-radius: 20px 20px 0 0;
            padding: 24px 20px;
            width: 100%;
            max-width: 100%;
            border: 1px solid #334155;
            border-bottom: none;
            animation: sheetUp 0.25s ease-out;
            max-height: 85vh;
            overflow-y: auto;
        }

        @keyframes sheetUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal h2 {
            font-size: 1.1rem;
            margin-bottom: 18px;
            color: #f1f5f9;
            font-weight: 700;
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #38bdf8; }
        .form-group input::placeholder { color: #475569; }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 18px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success { border-color: #22c55e; }
        .toast.error { border-color: #ef4444; }
        .toast.warning { border-color: #f59e0b; }

        /* ===== ICON GRID ===== */
        .subject-icons {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            margin-top: 6px;
        }

        .subject-icon-option {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: #0f172a;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.15s;
        }

        .subject-icon-option:active {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            transform: scale(0.92);
        }

        .subject-icon-option.selected {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.15);
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state .emoji {
            font-size: 3rem;
            margin-bottom: 12px;
            display: block;
        }

        .empty-state h2 {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* ===== RESET PANEL ===== */
        .reset-panel {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px 16px;
            margin: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .reset-panel h3 {
            font-size: 0.85rem;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .reset-actions { display: flex; gap: 6px; flex-wrap: wrap; }

        /* ===== MINI PLAYER ===== */
        .mini-player {
            position: fixed;
            bottom: 16px;
            right: 16px;
            width: 240px;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
            overflow: hidden;
            animation: miniPlayerIn 0.3s ease-out;
        }

        .mini-player.active { display: block; }

        @keyframes miniPlayerIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .mini-player iframe {
            width: 100%;
            height: 135px;
            border: none;
            display: block;
        }

        .mini-player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        .mini-player-header span {
            font-size: 0.7rem;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        .mini-player-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1rem;
            cursor: pointer;
            padding: 2px 6px;
        }

        .mini-player-close:active { color: #e2e8f0; }
    </style>
</head>
<body>
    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-left">
            <h1 onclick="goHome()">StudyTube</h1>
            <div class="view-toggle">
                <button id="btnView" class="active" onclick="switchMode('view')">
                    <span>👁️</span> View
                </button>
                <button id="btnEdit" onclick="switchMode('edit')">
                    <span>✏️</span> Edit
                </button>
            </div>
        </div>
        <div style="display:flex; gap:6px;">
            <button class="btn btn-warning" id="resetBtn" onclick="openResetModal()" style="display:none;">
                <span>↺</span>
            </button>
            <button class="btn btn-primary" id="newSubjectBtn" onclick="openSubjectModal()" style="display:none;">
                <span>+</span> New
            </button>
        </div>
    </div>

    <!-- ===== CIRCLES DASHBOARD ===== -->
    <div id="circlesView" class="circles-container"></div>

    <!-- ===== SUBJECT DETAIL VIEW ===== -->
    <div id="subjectDetailView" class="subject-detail">
        <!-- In-App Video Player -->
        <div class="video-player-section" id="videoPlayerSection" style="display:none;">
            <div class="video-player-container" id="videoPlayerContainer">
                <iframe id="mainPlayer" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
            </div>
            <div class="player-controls-bar">
                <h3 id="playerTitle">Video Title</h3>
                <div class="player-btns">
                    <button class="btn btn-secondary" onclick="toggleMiniPlayer()">🗗 Mini</button>
                    <button class="btn btn-danger" onclick="closePlayer()">✕ Close</button>
                </div>
            </div>
        </div>

        <!-- Android-style App Bar -->
        <div class="app-bar">
            <button class="back-btn" onclick="goHome()" title="Back">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <div class="app-bar-title">
                <span class="icon" id="detailIcon">📚</span>
                <h2 id="detailName">Subject Name</h2>
            </div>
            <div class="app-bar-progress">
                <div class="app-bar-progress-bar">
                    <div class="app-bar-progress-fill" id="detailProgressFill" style="width:0%"></div>
                </div>
                <span class="app-bar-progress-text" id="detailProgressText">0/0</span>
            </div>
            <div class="app-bar-actions" id="detailActions"></div>
        </div>

        <div id="resetPanel" class="reset-panel" style="display:none;">
            <h3>⚠️ Reset</h3>
            <div class="reset-actions">
                <button class="btn btn-secondary" onclick="resetSubjectProgress()">This Subject</button>
                <button class="btn btn-danger" onclick="resetAllProgress()">All History</button>
            </div>
        </div>

        <div id="videosContainer" class="videos-grid"></div>
    </div>

    <!-- ===== EMPTY STATE ===== -->
    <div id="emptyState" class="empty-state" style="display:none;">
        <span class="emoji">📚</span>
        <h2>No Subjects Yet</h2>
        <p>Create your first subject to start organizing your study videos.</p>
        <button class="btn btn-primary" onclick="openSubjectModal()">Create Subject</button>
    </div>

    <!-- ===== MINI PLAYER ===== -->
    <div class="mini-player" id="miniPlayer">
        <div class="mini-player-header">
            <span id="miniPlayerTitle">Video</span>
            <button class="mini-player-close" onclick="closeMiniPlayer()">✕</button>
        </div>
        <iframe id="miniPlayerFrame" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
    </div>

    <!-- ===== BOTTOM SHEET MODALS ===== -->
    <div class="modal-overlay" id="subjectModal" onclick="if(event.target===this)closeSubjectModal()">
        <div class="modal">
            <h2 id="subjectModalTitle">Create Subject</h2>
            <div class="form-group">
                <label>Subject Name</label>
                <input type="text" id="subjectNameInput" placeholder="e.g. Economics, History...">
            </div>
            <div class="form-group">
                <label>Choose Icon</label>
                <div class="subject-icons" id="iconGrid"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeSubjectModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveSubject()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="videoModal" onclick="if(event.target===this)closeVideoModal()">
        <div class="modal">
            <h2 id="videoModalTitle">Add Video</h2>
            <div class="form-group">
                <label>YouTube Link</label>
                <input type="text" id="videoUrlInput" placeholder="Paste YouTube URL here...">
            </div>
            <div class="form-group">
                <label>Video Title (optional)</label>
                <input type="text" id="videoTitleInput" placeholder="Leave blank to auto-fetch">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeVideoModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveVideo()">Add Video</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="renameModal" onclick="if(event.target===this)closeRenameModal()">
        <div class="modal">
            <h2>Rename Video</h2>
            <div class="form-group">
                <label>New Title</label>
                <input type="text" id="renameInput" placeholder="Enter new title...">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeRenameModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveRename()">Rename</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="resetModal" onclick="if(event.target===this)closeResetModal()">
        <div class="modal">
            <h2>⚠️ Reset Watch History</h2>
            <p style="color:#94a3b8; margin-bottom:16px; line-height:1.5; font-size:0.85rem;">
                Choose what you want to reset. This cannot be undone.
            </p>
            <div class="modal-actions" style="flex-direction:column; align-items:stretch; gap:8px;">
                <button class="btn btn-secondary" onclick="resetAllProgress()" style="justify-content:center; padding:12px;">
                    ↺ Reset All Watch History
                </button>
                <button class="btn btn-secondary" onclick="resetAllSubjectOrder()" style="justify-content:center; padding:12px;">
                    ↺ Reset Subject Order
                </button>
                <button class="btn btn-danger" onclick="resetEverything()" style="justify-content:center; padding:12px;">
                    🗑️ Delete ALL Data
                </button>
                <button class="btn btn-ghost" onclick="closeResetModal()" style="justify-content:center; margin-top:4px;">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMsg">Action completed</span>
    </div>

    <script>
        // ===== STATE =====
        let subjects = JSON.parse(localStorage.getItem('studySubjects')) || [];
        let editingSubjectId = null;
        let currentSubjectForVideo = null;
        let currentVideoToRename = null;
        let selectedIcon = '📚';
        let currentMode = 'view';
        let currentPlayingVideoId = null;
        let currentPlayingSubjectId = null;
        let currentPlayingVideoLocalId = null;
        let currentViewingSubjectId = null;
        let draggedIndex = null;
        let isMiniPlayer = false;

        const ICONS = ['📚','🌍','📜','🏛️','💰','🔬','💻','🧠','👥','✍️','🗣️','🎨','🎵','⚽','🍎','🔭','⚗️','📐','🧮','🌿','🏔️','🌊','🚀','⚡','🧬','🦠','🌡️','💊','🏥','⚖️','🗳️','🌐','📊','📈','💡','🔧','🎯','🏆','⭐','❤️','🔥','💎','🌙','☀️','🌈','🍀','🎓','📖','✏️','📝'];

        // ===== INIT =====
        document.addEventListener('DOMContentLoaded', () => {
            renderCircles();
            renderIconGrid();
            switchMode('view');
        });

        // ===== NAVIGATION =====
        function goHome() {
            document.getElementById('circlesView').style.display = 'flex';
            document.getElementById('subjectDetailView').classList.remove('active');
            document.getElementById('emptyState').style.display = subjects.length === 0 ? 'block' : 'none';
            currentViewingSubjectId = null;
            renderCircles();
        }

        function openSubject(subjectId) {
            currentViewingSubjectId = subjectId;
            const subject = subjects.find(s => s.id === subjectId);
            if (!subject) return;

            document.getElementById('circlesView').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('subjectDetailView').classList.add('active');

            document.getElementById('detailIcon').textContent = subject.icon;
            document.getElementById('detailName').textContent = subject.name;

            const completed = subject.videos.filter(v => v.completed).length;
            const total = subject.videos.length;
            const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('detailProgressFill').style.width = pct + '%';
            document.getElementById('detailProgressText').textContent = `${completed}/${total}`;

            const actionsDiv = document.getElementById('detailActions');
            if (currentMode === 'edit') {
                actionsDiv.innerHTML = `
                    <button class="btn btn-secondary" onclick="openSubjectModal('${subjectId}')">Edit</button>
                    <button class="btn btn-danger" onclick="deleteSubject('${subjectId}')">Delete</button>
                `;
            } else {
                actionsDiv.innerHTML = '';
            }

            document.getElementById('resetPanel').style.display = currentMode === 'edit' ? 'flex' : 'none';
            renderVideos(subject);
        }

        // ===== MODE SWITCHING =====
        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btnView').classList.toggle('active', mode === 'view');
            document.getElementById('btnEdit').classList.toggle('active', mode === 'edit');
            document.getElementById('newSubjectBtn').style.display = mode === 'edit' ? 'flex' : 'none';
            document.getElementById('resetBtn').style.display = mode === 'edit' ? 'flex' : 'none';

            if (currentViewingSubjectId) {
                openSubject(currentViewingSubjectId);
            } else {
                renderCircles();
            }
        }

        // ===== RENDER CIRCLES =====
        function renderCircles() {
            const container = document.getElementById('circlesView');
            const emptyState = document.getElementById('emptyState');

            if (subjects.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'flex';
            emptyState.style.display = 'none';

            let html = subjects.map((subject, index) => {
                const completed = subject.videos.filter(v => v.completed).length;
                const total = subject.videos.length;

                const dragAttrs = currentMode === 'edit'
                    ? `draggable="true" ondragstart="dragStart(event, ${index})" ondragover="dragOver(event, ${index})" ondrop="drop(event, ${index})" ondragend="dragEnd(event)"`
                    : '';

                return `
                <div class="subject-circle" ${dragAttrs} data-index="${index}">
                    ${currentMode === 'edit' ? `<div class="drag-handle" title="Drag to reorder">⋮⋮</div>` : ''}
                    <div class="circle-ring"></div>
                    <span class="circle-icon">${subject.icon}</span>
                    <span class="circle-name">${escapeHtml(subject.name)}</span>
                    ${total > 0 ? `<span class="circle-progress">${completed}/${total}</span>` : ''}
                </div>
                `;
            }).join('');

            if (currentMode === 'edit') {
                html += `
                <div class="subject-circle add-circle" onclick="openSubjectModal()">
                    <span class="circle-icon">+</span>
                    <span class="circle-name">New</span>
                </div>
                `;
            }

            container.innerHTML = html;

            container.querySelectorAll('.subject-circle:not(.add-circle)').forEach((circle, idx) => {
                circle.addEventListener('click', (e) => {
                    if (e.target.classList.contains('drag-handle')) return;
                    openSubject(subjects[idx].id);
                });
            });
        }

        // ===== DRAG & DROP =====
        function dragStart(e, index) {
            draggedIndex = index;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', index);
        }

        function dragOver(e, index) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const circle = e.currentTarget;
            if (index !== draggedIndex) {
                circle.classList.add('drag-over');
            }
        }

        function drop(e, index) {
            e.preventDefault();
            if (draggedIndex === null || draggedIndex === index) return;
            const temp = subjects[draggedIndex];
            subjects[draggedIndex] = subjects[index];
            subjects[index] = temp;
            saveData();
            renderCircles();
            showToast('Subjects reordered!');
        }

        function dragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.subject-circle').forEach(c => c.classList.remove('drag-over'));
            draggedIndex = null;
        }

        // ===== IN-APP VIDEO PLAYER =====
        function playVideo(videoId, title, subjectId, videoLocalId) {
            if (!videoId) return;

            currentPlayingVideoId = videoId;
            currentPlayingSubjectId = subjectId;
            currentPlayingVideoLocalId = videoLocalId;

            document.getElementById('videoPlayerSection').style.display = 'block';
            document.getElementById('playerTitle').textContent = title || 'YouTube Video';

            const iframe = document.getElementById('mainPlayer');
            iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&enablejsapi=1&playsinline=1`;

            document.getElementById('miniPlayer').classList.remove('active');
            isMiniPlayer = false;

            document.getElementById('videoPlayerSection').scrollIntoView({ behavior: 'smooth', block: 'start' });

            setTimeout(() => {
                markVideoCompleted(subjectId, videoLocalId);
            }, 5000);

            renderVideos(subjects.find(s => s.id === subjectId));
        }

        function toggleMiniPlayer() {
            const videoId = currentPlayingVideoId;
            const title = document.getElementById('playerTitle').textContent;
            if (!videoId) return;

            document.getElementById('videoPlayerSection').style.display = 'none';
            document.getElementById('mainPlayer').src = '';

            document.getElementById('miniPlayer').classList.add('active');
            document.getElementById('miniPlayerTitle').textContent = title;
            document.getElementById('miniPlayerFrame').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&enablejsapi=1&playsinline=1`;
            isMiniPlayer = true;
        }

        function closePlayer() {
            document.getElementById('videoPlayerSection').style.display = 'none';
            document.getElementById('mainPlayer').src = '';
            currentPlayingVideoId = null;
            currentPlayingSubjectId = null;
            currentPlayingVideoLocalId = null;
            isMiniPlayer = false;

            if (currentViewingSubjectId) {
                renderVideos(subjects.find(s => s.id === currentViewingSubjectId));
            }
        }

        function closeMiniPlayer() {
            document.getElementById('miniPlayer').classList.remove('active');
            document.getElementById('miniPlayerFrame').src = '';
            currentPlayingVideoId = null;
            currentPlayingSubjectId = null;
            currentPlayingVideoLocalId = null;
            isMiniPlayer = false;
        }

        function markVideoCompleted(subjectId, videoId) {
            if (!subjectId || !videoId) return;
            const subject = subjects.find(s => s.id === subjectId);
            if (!subject) return;
            const video = subject.videos.find(v => v.id === videoId);
            if (!video || video.completed) return;

            video.completed = true;
            saveData();
            if (currentViewingSubjectId === subjectId) {
                openSubject(subjectId);
            }
            showToast('Video marked as completed!');
        }

        // ===== RENDER VIDEOS =====
        function renderVideos(subject) {
            const container = document.getElementById('videosContainer');

            if (subject.videos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1; padding:40px;">
                        <span class="emoji">🎬</span>
                        <h2>No Videos Yet</h2>
                        <p>Add your first video to this subject.</p>
                    </div>
                `;
                return;
            }

            let html = subject.videos.map(video => {
                const isPlaying = currentPlayingVideoId === video.videoId && !isMiniPlayer;
                return `
                <div class="video-card ${video.completed ? 'completed' : ''} ${isPlaying ? 'active-playing' : ''}" onclick="playVideo('${video.videoId}', '${escapeHtml(video.title)}', '${subject.id}', '${video.id}')">
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg'">
                        <div class="play-overlay">
                            <div class="play-icon">▶️</div>
                        </div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${escapeHtml(video.title)}</div>
                        <div class="video-meta">
                            <span class="video-status ${video.completed ? 'completed' : 'pending'}">
                                ${video.completed ? '✓ Done' : 'New'}
                            </span>
                            ${currentMode === 'edit' ? `
                            <div class="video-actions" onclick="event.stopPropagation()">
                                <button class="icon-btn" onclick="openRenameModal('${subject.id}', '${video.id}')" title="Rename">✏️</button>
                                <button class="icon-btn delete" onclick="deleteVideo('${subject.id}', '${video.id}')" title="Delete">🗑️</button>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            if (currentMode === 'edit') {
                html += `
                <div class="video-card add-video-card" onclick="openVideoModal('${subject.id}')">
                    <span class="plus">+</span>
                    <span>Add Video</span>
                </div>
                `;
            }

            container.innerHTML = html;
        }

        function renderIconGrid() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = ICONS.map(icon => `
                <div class="subject-icon-option ${icon === selectedIcon ? 'selected' : ''}"
                     onclick="selectIcon('${icon}')">${icon}</div>
            `).join('');
        }

        function selectIcon(icon) {
            selectedIcon = icon;
            renderIconGrid();
        }

        // ===== SUBJECT CRUD =====
        function openSubjectModal(subjectId = null) {
            editingSubjectId = subjectId;
            const modal = document.getElementById('subjectModal');
            const title = document.getElementById('subjectModalTitle');
            const input = document.getElementById('subjectNameInput');

            if (subjectId) {
                const subject = subjects.find(s => s.id === subjectId);
                title.textContent = 'Edit Subject';
                input.value = subject.name;
                selectedIcon = subject.icon;
            } else {
                title.textContent = 'Create Subject';
                input.value = '';
                selectedIcon = '📚';
            }

            renderIconGrid();
            modal.classList.add('active');
            input.focus();
        }

        function closeSubjectModal() {
            document.getElementById('subjectModal').classList.remove('active');
            editingSubjectId = null;
        }

        function saveSubject() {
            const name = document.getElementById('subjectNameInput').value.trim();
            if (!name) {
                showToast('Please enter a subject name', 'error');
                return;
            }

            if (editingSubjectId) {
                const subject = subjects.find(s => s.id === editingSubjectId);
                subject.name = name;
                subject.icon = selectedIcon;
                showToast('Subject updated!');
                if (currentViewingSubjectId === editingSubjectId) {
                    openSubject(editingSubjectId);
                }
            } else {
                subjects.push({
                    id: generateId(),
                    name: name,
                    icon: selectedIcon,
                    videos: []
                });
                showToast('Subject created!');
            }

            saveData();
            closeSubjectModal();
            renderCircles();
        }

        function deleteSubject(id) {
            if (!confirm('Delete this subject and all its videos?')) return;
            subjects = subjects.filter(s => s.id !== id);
            saveData();
            if (currentViewingSubjectId === id) {
                goHome();
            } else {
                renderCircles();
            }
            showToast('Subject deleted');
        }

        // ===== VIDEO CRUD =====
        function openVideoModal(subjectId) {
            currentSubjectForVideo = subjectId;
            document.getElementById('videoModalTitle').textContent = 'Add Video';
            document.getElementById('videoUrlInput').value = '';
            document.getElementById('videoTitleInput').value = '';
            document.getElementById('videoModal').classList.add('active');
            document.getElementById('videoUrlInput').focus();
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('active');
            currentSubjectForVideo = null;
        }

        async function saveVideo() {
            const url = document.getElementById('videoUrlInput').value.trim();
            let title = document.getElementById('videoTitleInput').value.trim();

            const videoId = extractVideoId(url);
            if (!videoId) {
                showToast('Invalid YouTube URL', 'error');
                return;
            }

            if (!title) {
                title = 'YouTube Video';
                try {
                    const resp = await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`);
                    if (resp.ok) {
                        const data = await resp.json();
                        title = data.title;
                    }
                } catch(e) {}
            }

            const subject = subjects.find(s => s.id === currentSubjectForVideo);
            subject.videos.push({
                id: generateId(),
                videoId: videoId,
                title: title,
                thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                url: url,
                completed: false,
                addedAt: Date.now()
            });

            saveData();
            closeVideoModal();
            if (currentViewingSubjectId === currentSubjectForVideo) {
                openSubject(currentSubjectForVideo);
            } else {
                renderCircles();
            }
            showToast('Video added!');
        }

        function deleteVideo(subjectId, videoId) {
            if (!confirm('Delete this video?')) return;
            const subject = subjects.find(s => s.id === subjectId);
            subject.videos = subject.videos.filter(v => v.id !== videoId);
            saveData();
            openSubject(subjectId);
            showToast('Video deleted');
        }

        // ===== RENAME =====
        function openRenameModal(subjectId, videoId) {
            currentVideoToRename = { subjectId, videoId };
            const subject = subjects.find(s => s.id === subjectId);
            const video = subject.videos.find(v => v.id === videoId);
            document.getElementById('renameInput').value = video.title;
            document.getElementById('renameModal').classList.add('active');
            document.getElementById('renameInput').focus();
        }

        function closeRenameModal() {
            document.getElementById('renameModal').classList.remove('active');
            currentVideoToRename = null;
        }

        function saveRename() {
            const newTitle = document.getElementById('renameInput').value.trim();
            if (!newTitle) {
                showToast('Title cannot be empty', 'error');
                return;
            }
            const subject = subjects.find(s => s.id === currentVideoToRename.subjectId);
            const video = subject.videos.find(v => v.id === currentVideoToRename.videoId);
            video.title = newTitle;
            saveData();
            closeRenameModal();
            if (currentViewingSubjectId === currentVideoToRename.subjectId) {
                openSubject(currentVideoToRename.subjectId);
            }
            showToast('Video renamed!');
        }

        // ===== RESET FUNCTIONS =====
        function openResetModal() {
            document.getElementById('resetModal').classList.add('active');
        }

        function closeResetModal() {
            document.getElementById('resetModal').classList.remove('active');
        }

        function resetAllProgress() {
            if (!confirm('Reset ALL watch history?')) return;
            subjects.forEach(subject => {
                subject.videos.forEach(video => { video.completed = false; });
            });
            saveData();
            closeResetModal();
            if (currentViewingSubjectId) openSubject(currentViewingSubjectId);
            else renderCircles();
            showToast('All watch history reset!', 'warning');
        }

        function resetSubjectProgress() {
            if (!currentViewingSubjectId) return;
            const subject = subjects.find(s => s.id === currentViewingSubjectId);
            if (!subject) return;
            if (!confirm(`Reset watch history for "${subject.name}"?`)) return;
            subject.videos.forEach(video => { video.completed = false; });
            saveData();
            openSubject(currentViewingSubjectId);
            showToast(`"${subject.name}" history reset!`, 'warning');
        }

        function resetAllSubjectOrder() {
            if (!confirm('Reset subject order to alphabetical?')) return;
            subjects.sort((a, b) => a.name.localeCompare(b.name));
            saveData();
            closeResetModal();
            renderCircles();
            showToast('Subject order reset!', 'warning');
        }

        function resetEverything() {
            if (!confirm('⚠️ Delete ALL data?')) return;
            if (!confirm('Are you REALLY sure?')) return;
            subjects = [];
            saveData();
            closeResetModal();
            closePlayer();
            closeMiniPlayer();
            goHome();
            showToast('All data deleted.', 'error');
        }

        // ===== UTILS =====
        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function saveData() {
            localStorage.setItem('studySubjects', JSON.stringify(subjects));
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastMsg');
            text.textContent = msg;
            icon.textContent = type === 'error' ? '❌' : type === 'warning' ? '⚠️' : '✅';
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ===== HARDWARE BACK BUTTON (Android) =====
        document.addEventListener('backbutton', (e) => {
            e.preventDefault();
            if (document.getElementById('subjectModal').classList.contains('active')) {
                closeSubjectModal();
            } else if (document.getElementById('videoModal').classList.contains('active')) {
                closeVideoModal();
            } else if (document.getElementById('renameModal').classList.contains('active')) {
                closeRenameModal();
            } else if (document.getElementById('resetModal').classList.contains('active')) {
                closeResetModal();
            } else if (currentViewingSubjectId) {
                goHome();
            }
        }, false);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeSubjectModal();
                closeVideoModal();
                closeRenameModal();
                closeResetModal();
            }
        });
    </script>
</body>
</html>
